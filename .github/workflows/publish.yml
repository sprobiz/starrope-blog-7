name: 📅 Scheduled Post Publisher

on:
  schedule:
    # KST 오전 8시 = UTC 23:00 (전날)
    - cron: '0 23 * * *'
    # KST 오후 4시 = UTC 07:00
    - cron: '0 7 * * *'
  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📝 Run publish script
        run: python scripts/publish.py

      - name: 📊 Check for changes
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 🚀 Commit and push published posts
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Starrope Auto Publisher"
          git add -A
          git commit -m "📅 자동 발행: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git push
